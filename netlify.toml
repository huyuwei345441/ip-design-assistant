[build]
  publish = "."
  command = "npm install"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express"]
  included_files = ["scripts/**", "docs/**", "assets/manifest.json"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
