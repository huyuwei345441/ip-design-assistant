<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提示词生成 — 福宝 IP 设计助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #1477FF; --blue-light: #ECF5FF; --blue-hover: #005EE6;
  --orange: #FF6B3D; --orange-light: #FFF3EE;
  --bg: #F5F9FF; --card: #fff; --text: #05070D; --text2: #596276; --text3: #8B95A7;
  --border: #DDEBFA; --border-light: #EAF2FC;
  --success: #16C964; --success-bg: #F0FFF6;
  --error: #F43F3F; --error-bg: #FFF5F5;
  --shadow: 0 1px 4px rgba(0,0,0,0.04), 0 2px 12px rgba(0,0,0,0.03);
  --radius: 16px; --radius-sm: 10px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; -webkit-font-smoothing:antialiased; }
::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#CDD3DE; border-radius:4px; }

.header { background:rgba(255,255,255,0.86); padding:0 40px; height:72px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(216,229,245,0.8); position:sticky; top:0; z-index:100; backdrop-filter:blur(14px); }
.header-left { display:flex; align-items:center; gap:14px; }
.header-left a { text-decoration:none; color:inherit; }
.header-left h1 { font-size:22px; font-weight:800; }
.back-link { font-size:14px; color:var(--text3); text-decoration:none; display:flex; align-items:center; gap:6px; transition:color var(--transition); }
.back-link:hover { color:var(--blue); }

.tab-bar { background:#fff; border-bottom:1px solid var(--border); padding:0 40px; display:flex; gap:4px; position:sticky; top:72px; z-index:99; }
.tab { padding:14px 22px; font-size:14px; font-weight:550; color:var(--text2); cursor:pointer; border:none; background:none; border-bottom:2.5px solid transparent; transition:all var(--transition); font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.tab:hover { color:var(--blue); background:var(--blue-light); }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:650; }

.container { max-width:1040px; margin:32px auto; padding:0 28px; }
.card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border-light); padding:32px; margin-bottom:24px; }
.card-header { margin-bottom:22px; }
.card-header h2 { font-size:22px; font-weight:800; margin-bottom:4px; }
.card-header .subtitle { font-size:13px; color:var(--text3); }

.form-group { margin-bottom:18px; }
.form-group label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text); }
.form-group input, .form-group textarea, .form-group select { width:100%; padding:11px 16px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; font-family:inherit; color:var(--text); background:#FAFBFC; transition:all var(--transition); }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px rgba(20,119,255,0.06); }
.form-group textarea { resize:vertical; min-height:80px; line-height:1.7; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }

.btn { display:inline-flex; align-items:center; gap:7px; padding:11px 28px; border:none; border-radius:999px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:all var(--transition); }
.btn-primary { background:#000; color:#fff; box-shadow:0 10px 24px rgba(0,0,0,0.12); }
.btn-primary:hover { background:#1a1a1a; transform:translateY(-1px); box-shadow:0 12px 28px rgba(0,0,0,0.16); }
.btn-primary:disabled { opacity:0.55; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-copy { background:#fff; color:var(--blue); border:1.5px solid var(--border); margin-top:12px; font-size:13px; padding:8px 18px; border-radius:8px; }
.btn-copy:hover { border-color:var(--blue); background:var(--blue-light); }
.btn-copy.copied { background:var(--success); color:#fff; border-color:var(--success); }

.result { display:none; margin-top:22px; }
.result.show { display:block; animation:fadeIn 0.3s ease-out; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.prompt-box { background:#FAFBFC; border:1.5px solid var(--border-light); border-radius:var(--radius-sm); padding:20px 24px; font-size:15px; line-height:1.9; word-break:break-word; color:var(--text); font-family:"SF Mono","Menlo","Monaco","Courier New",monospace; }
.section-title { font-size:15px; font-weight:700; margin:8px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border-light); }
.error-msg { background:var(--error-bg); border:1px solid #FCC; border-radius:var(--radius-sm); padding:11px 16px; color:var(--error); font-size:13px; margin-top:12px; display:none; }
.spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.footer { text-align:center; padding:28px; color:var(--text3); font-size:13px; border-top:1px solid var(--border-light); margin-top:48px; }

@media(max-width:640px) {
  .header { padding:0 20px; } .tab-bar { padding:0 20px; overflow-x:auto; }
  .tab { padding:12px 14px; font-size:12px; white-space:nowrap; }
  .container { padding:0 16px; } .card { padding:24px; }
  .form-row { grid-template-columns:1fr; } .header-left h1 { font-size:18px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left"><a href="./index.html"><h1>福宝 IP 设计助手</h1></a></div>
  <a href="./index.html" class="back-link">← 返回首页</a>
</header>

<nav class="tab-bar">
  <a class="tab" href="./advise.html">🎯 规范顾问</a>
  <a class="tab active" href="./prompt.html">✨ 提示词生成</a>
  <a class="tab" href="./create.html">💡 创意工坊</a>
  <a class="tab" href="./assets.html">🖼️ 素材库</a>
  <a class="tab" href="./handbook.html">📖 IP规范手册</a>
</nav>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>提示词生成</h2>
      <p class="subtitle">参照历史优质 Prompt 格式，生成标准化生图提示词<br><span style="font-size:11px;color:var(--orange)">⚠ 需搭配IP参考图生图</span></p>
    </div>

    <div class="form-row">
      <div class="form-group"><label>使用场景 <span style="color:var(--error)">*</span></label><input id="scene" placeholder="例如：确认弹窗、空状态、运营图"></div>
      <div class="form-group"><label>职业/穿搭</label><input id="occupation" placeholder="输入职业自动推导穿搭，或直接描写穿搭。例如：职业经理人"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>表情</label><select id="expression"><option value="">不指定</option><option>开心笑</option><option>微笑</option><option>困惑</option><option>惊讶</option><option>安慰</option><option>兴奋</option><option>平静</option><option>眨眼</option></select></div>
      <div class="form-group"><label>颜色</label><input id="color" placeholder="例如：正红色、淡蓝色系、暖金色"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>动作/姿势</label><input id="action" placeholder="例如：左手叉腰，右手抬起打招呼"></div>
      <div class="form-group"><label>道具</label><input id="prop" placeholder="例如：金色权杖、蓝色文件夹、红包"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>背景描述</label><input id="background" placeholder="例如：暖色渐变背景、办公室场景"></div>
      <div class="form-group"><label>额外描述</label><input id="extra" placeholder="附加到 Prompt 末尾的文字"></div>
    </div>

    <button class="btn btn-primary" onclick="submit()">✨ 生成 Prompt</button>
    <div id="error-msg" class="error-msg"></div>

    <div id="result" class="result">
      <div class="section-title">📝 生成结果</div>
      <div id="result-detail" style="margin-bottom:12px"></div>
      <div class="prompt-box" id="prompt-text"></div>
      <button class="btn btn-copy" onclick="copyPrompt()">📋 一键复制</button>
    </div>
  </div>
</div>

<div class="footer">58数科 福宝IP设计助手</div>

<script>

async function submit() {
  const scene = document.getElementById('scene').value.trim();
  const errEl = document.getElementById('error-msg');
  if (!scene) { errEl.textContent = '请输入使用场景'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 生成中...';

  const body = { scene };
  ['expression','action','prop','background','extra','occupation','color'].forEach(id => {
    const el = document.getElementById(id);
    const v = el.tagName === 'SELECT' ? el.value : el.value.trim();
    if (v) body[id] = v;
  });

  try {
    const d = await fetch('/api/prompt', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
      .then(r => r.ok ? r.json() : (async()=>{const e=await r.json();throw new Error(e.error||'请求失败')})());

    document.getElementById('prompt-text').textContent = d.prompt;

    // 显示优化详情
    let detailHtml = '';
    if (d.optimized) {
      detailHtml += '<div style="font-size:11px;color:var(--success);margin-bottom:10px">🤖 AI 智能优化</div>';
    } else if (d.hint) {
      detailHtml += '<div style="font-size:11px;color:var(--text3);margin-bottom:10px">💡 ' + esc(d.hint) + '</div>';
    }
    if (d.outfitDetail || d.outfitOptimized) detailHtml += '<div class="result-item" style="margin-bottom:8px"><div class="label">👔 职业穿搭</div><div class="value" style="font-size:13px">' + esc(d.outfitDetail || d.outfitOptimized) + '</div></div>';
    if (d.actionOptimized) detailHtml += '<div class="result-item" style="margin-bottom:8px"><div class="label">✋ 动作优化</div><div class="value" style="font-size:13px">' + esc(d.actionOptimized) + '</div></div>';
    if (d.colorScheme) detailHtml += '<div class="result-item" style="margin-bottom:8px"><div class="label">🎨 配色方案</div><div class="value" style="font-size:13px">' + esc(d.colorScheme) + '</div></div>';
    document.getElementById('result-detail').innerHTML = detailHtml;
    document.getElementById('result').classList.add('show');
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.innerHTML = '✨ 生成 Prompt';
  }
}

function copyPrompt() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const b = document.querySelector('.btn-copy');
    b.textContent = '✅ 已复制'; b.classList.add('copied');
    setTimeout(() => { b.textContent = '📋 一键复制'; b.classList.remove('copied'); }, 2000);
  });
}
function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
</script>
</body>
</html>
