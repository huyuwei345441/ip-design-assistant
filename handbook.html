<style>
:root {

  --radius: 16px;

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;

::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#CDD3DE; border-radius:4px; }

/* Header */
.header {
  background: rgba(255,255,255,0.86); color: var(--text); padding: 0 40px; height: 72px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(216,229,245,0.8); position: sticky; top: 0; z-index: 100;

.header-left { display:flex; align-items:center; gap:14px; }
.header-left a { text-decoration:none; color:inherit; }
.header-left h1 { font-size:22px; font-weight:800; letter-spacing:-0.4px; }
.back-link { 
  display: inline-flex; align-items: center; justify-content: center;
  height: 46px; padding: 0 24px; border-radius: 999px;

  font-size: 16px; font-weight: 800;

.back-link:hover {

.tab:hover { color:var(--blue); background:var(--blue-light); }

  background:#F3F4F8; padding:3px 8px; 
  border-radius:5px; font-size:14px;
  font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
}
.handbook-content strong { color:var(--text); font-weight:650; }
.handbook-content img { 
  border-radius:var(--radius-sm); max-width:100%; 
  margin:16px 0;
}
.handbook-content hr { 
  border:none; border-top:1px solid var(--border-light); 
  margin:20px 0;
}
.handbook-content .loading { 
  text-align:center; padding:60px;

## 颜色推导

作为一个互联网产品来说，多元化的色彩系统是必不可缺的。根据最新的品牌色，我们延展了相近色、互补色为辅的色彩体系，再结合基础色黑白灰来完善我们的色彩系统。使产品具备多元化属性，并为用户带来丰富的视觉感官体验。

**HSB颜色推导**

当下两种颜色推导方法，分别是Material Rgb进行明暗变化以及HSB的饱和度亮度明度方法。在对比后发现Material Rgb调色方法的相关颜色会出现色相偏差，而HSB调色方法相对感官来说更精准，因此决定使用HSB方法进行颜色推导。

根据色环推导方法

色相差值 15° 以内的颜色为邻近色;

色相差值 30° 以内的颜色为类似色;

色相差值 180° 的颜色为互补色。

最终再在进行了同色系删减及感官明度校准后得出色板。

function renderMarkdown(text) {
  text = text.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/!\[图片\]\((.+?)\)/g, '<img src="$1" alt="图片" />');
  text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
  text = text.replace(/^\|(.+)\|$/gm, function(match) {
    const parts = match.split('|').map(p => p.trim()).filter(p => p);
    if (parts.length > 1) {
      return '<tr><td>' + parts.join('</td><td>') + '</td></tr>';
    }
    return match;
  });
  text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.+<\/li>)/g, function(match) {
    if (!match.includes('</ul>')) {
      return '<ul>' + match + '</ul>';
    }
    return match;
  });
  text = text.replace(/\n\n/g, '</p><p>');
  text = text.replace(/<\/ul>\n<ul>/g, '');
  text = text.replace(/(<tr>.+<\/tr>)/g, function(match) {
    if (!match.includes('</table>')) {
      return '<table><thead>' + match + '</thead></table>';
    }
    return match;
  });
  text = text.replace(/<thead>(<tr>.*<\/tr>)<\/thead><table>/g, '<table><thead>$1</thead>');
  text = text.replace(/<table><thead>(<tr>.*<\/tr>)<\/thead><\/table>/g, '<table><thead>$1</thead><tbody></tbody></table>');
  text = text.replace(/<table><thead>(.+?)<\/thead>(<tr>.*<\/tr>)<\/table>/g, '<table><thead>$1</thead><tbody>$2</tbody></table>');
  
  return '<p>' + text + '</p>';
}

function renderSidebar() {
  const brandSidebar = document.getElementById('sidebar-brand');
  const ipSidebar = document.getElementById('sidebar-ip');
  const appSidebar = document.getElementById('sidebar-app');
  const uiSidebar = document.getElementById('sidebar-ui');
  
  handbookData.brand.forEach((item, index) => {
    const link = document.createElement('a');
    link.className = 'doc-link' + (index === 0 ? ' active' : '');
    link.href = '#';
    link.textContent = item.title;
    link.onclick = () => showContent('brand', index);
    brandSidebar.appendChild(link);
  });
  
  handbookData.ip.forEach((item, index) => {
    const link = document.createElement('a');
    link.className = 'doc-link';
    link.href = '#';
    link.textContent = item.title;
    link.onclick = () => showContent('ip', index);
    ipSidebar.appendChild(link);
  });
  
  handbookData.app.forEach((item, index) => {
    const link = document.createElement('a');
    link.className = 'doc-link';
    link.href = '#';
    link.textContent = item.title;
    link.onclick = () => showContent('app', index);
    appSidebar.appendChild(link);
  });
  
  handbookData.ui.forEach((item, index) => {
    const link = document.createElement('a');
    link.className = 'doc-link';
    link.href = '#';
    link.textContent = item.title;
    link.onclick = () => showContent('ui', index);
    uiSidebar.appendChild(link);
  });
}

function showContent(category, index) {
  document.querySelectorAll('.doc-link').forEach(l => l.classList.remove('active'));
  
  let data, sidebarId;
  switch(category) {
    case 'brand':
      data = handbookData.brand;
      sidebarId = 'sidebar-brand';
      break;
    case 'ip':
      data = handbookData.ip;
      sidebarId = 'sidebar-ip';
      break;
    case 'app':
      data = handbookData.app;
      sidebarId = 'sidebar-app';
      break;
    case 'ui':
      data = handbookData.ui;
      sidebarId = 'sidebar-ui';
      break;
  }
  
  document.querySelectorAll(`#${sidebarId} .doc-link`)[index].classList.add('active');
  
  const content = document.getElementById('content');
  const item = data[index];
  content.innerHTML = renderMarkdown(item.content);
}

renderSidebar();
showContent('brand', 0);
